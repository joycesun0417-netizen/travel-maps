<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旅行地图集</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#FAF9F7;--card-bg:#FFF;--text:#1A1A1A;--text-light:#6B7280;
            --border:#E5E5E5;--shadow:rgba(0,0,0,.06);
        }
        body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

        .page-header{text-align:center;padding:60px 20px 40px;position:relative}
        .page-header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60px;height:3px;background:linear-gradient(90deg,#2563EB,#9333EA);border-radius:2px}
        .page-logo{font-size:48px;margin-bottom:12px}
        .page-title{font-size:28px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
        .page-subtitle{font-size:14px;color:var(--text-light);font-weight:300}

        .trips-grid{max-width:960px;margin:40px auto;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}

        .trip-card{background:var(--card-bg);border-radius:16px;overflow:hidden;box-shadow:0 2px 12px var(--shadow);border:1px solid var(--border);transition:all .3s ease;cursor:pointer;text-decoration:none;color:inherit;display:block}
        .trip-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,.1)}
        .trip-card-cover{height:180px;background-size:cover;background-position:center;position:relative}
        .trip-card-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.5))}
        .trip-card-emoji{position:absolute;bottom:12px;left:16px;font-size:32px;z-index:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
        .trip-card-body{padding:16px 18px 20px}
        .trip-card-title{font-size:18px;font-weight:700;margin-bottom:4px}
        .trip-card-date{font-size:12px;color:var(--text-light);margin-bottom:10px}
        .trip-card-desc{font-size:13px;color:#444;line-height:1.6}
        .trip-card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
        .trip-tag{font-size:11px;padding:3px 10px;border-radius:20px;background:#F3F4F6;color:var(--text-light)}

        .trip-card-add{border:2px dashed var(--border);background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;transition:all .3s}
        .trip-card-add:hover{border-color:#2563EB;background:rgba(37,99,235,.03)}
        .trip-card-add .add-icon{font-size:48px;color:#D1D5DB;margin-bottom:12px;transition:color .3s}
        .trip-card-add:hover .add-icon{color:#2563EB}
        .trip-card-add .add-text{font-size:14px;color:var(--text-light)}

        .footer{text-align:center;padding:40px 20px;font-size:12px;color:#9CA3AF}

        @media(max-width:640px){
            .page-header{padding:40px 16px 30px}
            .page-logo{font-size:36px}
            .page-title{font-size:22px}
            .trips-grid{padding:0 16px;gap:16px;grid-template-columns:1fr}
            .trip-card-cover{height:150px}
        }
    </style>
</head>
<body>

<div class="page-header">
    <div class="page-logo">🗺️</div>
    <h1 class="page-title">我的旅行地图集</h1>
    <p class="page-subtitle">每一次出发，都值得被记录</p>
</div>

<div class="trips-grid">
    <!-- 港澳四日游 -->
    <a class="trip-card" href="./hk-macau/">
        <div class="trip-card-cover" style="background-image:url('https://images.unsplash.com/photo-1536599018102-9f803c979b13?w=600&q=80')">
            <span class="trip-card-emoji">🇭🇰</span>
        </div>
        <div class="trip-card-body">
            <div class="trip-card-title">港澳四日漫游</div>
            <div class="trip-card-date">2026.05.02 — 05.05</div>
            <div class="trip-card-desc">从铜锣湾的烟火气到太平山的璀璨夜景，从旺角的市井味到维港的天际线，再渡海去澳门感受大三巴的历史沉淀。</div>
            <div class="trip-card-tags">
                <span class="trip-tag">港岛</span>
                <span class="trip-tag">九龙</span>
                <span class="trip-tag">凼仔</span>
                <span class="trip-tag">澳门半岛</span>
                <span class="trip-tag">4天3晚</span>
            </div>
        </div>
    </a>

    <!-- 占位：下一段旅程 -->
    <div class="trip-card trip-card-add" onclick="alert('用 Mira 说「帮我生成 XX 旅行路线图」即可创建新地图 ✈️')">
        <span class="add-icon">＋</span>
        <span class="add-text">下一段旅程...</span>
    </div>
</div>

<div class="footer">
    Powered by Leaflet.js · Hosted on GitHub Pages
</div>

</body>
</html>
