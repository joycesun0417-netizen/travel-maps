<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南京三日漫游</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --day1:#2D8C4E;--day2:#2563EB;--day3:#E06C2D;
            --bg:#FAF9F7;--card-bg:#FFF;--text:#1A1A1A;--text-light:#6B7280;
            --border:#E5E5E5;--shadow:rgba(0,0,0,.06);
        }
        body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}

        /* === HEADER === */
        .header{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(250,249,247,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
        .back-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:14px;color:var(--text);transition:all .2s;text-decoration:none;flex-shrink:0}
        .back-btn:hover{background:#F3F4F6;border-color:#aaa;transform:scale(1.05)}
        .header-left{display:flex;align-items:center;gap:10px}
        .header-logo{font-size:22px}
        .header-title{font-size:16px;font-weight:700;letter-spacing:.5px}
        .header-subtitle{font-size:11px;color:var(--text-light);font-weight:300;margin-top:1px}

        /* === LAYOUT === */
        .main-container{display:flex;height:100vh;padding-top:52px}
        .sidebar{position:relative;width:340px;min-width:340px;height:calc(100vh - 52px);overflow-y:auto;background:var(--bg);border-right:1px solid var(--border);padding:14px;scrollbar-width:thin;scrollbar-color:#ccc transparent}
        .sidebar::-webkit-scrollbar{width:4px}
        .sidebar::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
        /* === SIDEBAR TOGGLE === */
        .sidebar-toggle{position:fixed;top:50%;left:340px;transform:translateY(-50%);width:24px;height:56px;background:var(--card-bg);border:1px solid var(--border);border-left:none;border-radius:0 10px 10px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1001;box-shadow:2px 0 8px rgba(0,0,0,.08);font-size:13px;color:var(--text-light);transition:left .35s cubic-bezier(.4,0,.2,1)}
        .sidebar-toggle:hover{background:#f0f0f0;color:var(--text)}
        .sidebar-toggle.collapsed{left:0}
        .sidebar{position:relative;transition:width .35s cubic-bezier(.4,0,.2,1),min-width .35s cubic-bezier(.4,0,.2,1),padding .35s cubic-bezier(.4,0,.2,1),opacity .3s}
        .sidebar.collapsed{width:0!important;min-width:0!important;padding:0!important;overflow:hidden;opacity:0;border-right:none}
        
        .sidebar-expand-btn{position:fixed;top:50%;left:0;transform:translateY(-50%);width:24px;height:56px;background:var(--card-bg);border:1px solid var(--border);border-left:none;border-radius:0 10px 10px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1001;box-shadow:2px 0 8px rgba(0,0,0,.06);transition:all .2s;font-size:12px;color:var(--text-light);display:none}
        .sidebar-expand-btn:hover{background:#f0f0f0;color:var(--text)}
        .sidebar-expand-btn.show{display:flex}

        .map-container{flex:1;position:relative}
        #map{width:100%;height:100%}

        
        /* === EDIT MODE === */
        .edit-bar{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:800;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-radius:10px;padding:8px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.12);border:1px solid var(--border);display:none;font-size:13px}
        .edit-bar.show{display:flex}
        .edit-bar span{color:var(--text);font-weight:500}
        .edit-bar-btn{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card-bg);cursor:pointer;font-size:12px;font-weight:500;transition:all .2s}
        .edit-bar-btn.save{background:#2D8C4E;color:#fff;border-color:#2D8C4E}
        .edit-bar-btn.save:hover{background:#246e3e}
        .edit-bar-btn.cancel{background:#f5f5f5;color:#666}
        .edit-bar-btn.cancel:hover{background:#e5e5e5}
        
        

        /* === DETAIL PANEL (right side of map) === */
        .detail-panel{position:absolute;top:0;right:0;width:380px;height:100%;z-index:900;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-left:1px solid var(--border);overflow-y:auto;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);scrollbar-width:thin}
        .detail-panel.open{transform:translateX(0)}
        .detail-panel::-webkit-scrollbar{width:4px}
        .detail-panel::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
        .detail-close{position:static;flex-shrink:0;width:32px;height:32px;border-radius:50%;border:none;background:rgba(0,0,0,.06);cursor:pointer;font-size:16px;color:#666;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .2s}
        .detail-close:hover{background:rgba(0,0,0,.12);color:#333}

        .detail-image{width:100%;height:200px;overflow:hidden;background:linear-gradient(135deg,#f0ede8,#e8e4df);position:relative}
        .detail-image img{width:100%;height:100%;object-fit:cover}
        .detail-image-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px}
        .detail-day-badge{position:absolute;top:12px;left:12px;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:600;color:#fff;backdrop-filter:blur(6px)}

        .detail-header{padding:18px 18px 12px}
        .detail-title{font-size:20px;font-weight:700;padding-right:36px}
        .detail-meta{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
        .detail-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;background:#f3f4f6;color:var(--text-light)}

        .detail-body{padding:0 18px 20px}
        .detail-section{margin-bottom:14px}
        .detail-section:last-child{margin-bottom:0}
        .detail-section-title{font-size:11px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:5px}
        .detail-section-content{font-size:12.5px;line-height:1.8;color:var(--text)}
        .detail-food-item{display:flex;align-items:flex-start;gap:7px;padding:4px 0}
        .detail-food-emoji{font-size:15px;flex-shrink:0;margin-top:1px}
        .detail-food-name{font-weight:600;font-size:12.5px}
        .detail-food-desc{font-size:10.5px;color:var(--text-light);margin-top:1px}
        .detail-tip{background:#f8f6f3;border-radius:8px;padding:8px 12px;font-size:11.5px;line-height:1.7;color:var(--text-light)}
        .detail-tip strong{color:var(--text)}
        .photo-spot-item{display:flex;align-items:center;gap:5px;font-size:12px;margin-bottom:3px}

        
        .detail-top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);background:rgba(250,249,247,.8);position:sticky;top:0;z-index:10}
        .edit-loc-top{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:11px;color:var(--text-light);display:flex;align-items:center;gap:4px;transition:all .2s}
        .edit-loc-top:hover{background:rgba(0,0,0,.04);color:var(--text)}
        /* === DETAIL NAV TOP === */
        .detail-nav-top{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);background:rgba(250,249,247,.8)}
        .detail-nav-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card-bg);cursor:pointer;font-size:11px;font-weight:500;color:var(--text-light);transition:all .2s;display:flex;align-items:center;gap:4px}
        .detail-nav-btn:hover{background:#f0f0f0;color:var(--text)}
        .detail-nav-btn:disabled{opacity:.3;cursor:default;pointer-events:none}
        .detail-nav-btn .arrow{font-size:10px}
        .detail-nav-counter{font-size:11px;color:var(--text-light);font-weight:400}

        .detail-next-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;margin-top:16px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;color:#fff}
        .detail-next-btn:hover{opacity:.88;transform:translateY(-1px)}
        .detail-next-btn .arrow{font-size:16px}

        /* === DAY FILTER (map overlay) === */
        .day-filter{position:absolute;top:12px;left:54px;z-index:800;display:flex;gap:5px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);padding:6px 10px;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
        .day-tab{padding:5px 13px;border-radius:16px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text-light);transition:all .3s;white-space:nowrap;font-family:inherit}
        .day-tab:hover{border-color:#aaa}
        .day-tab.active{color:#fff}
        .day-tab.active[data-day="all"]{background:var(--text);border-color:var(--text)}
        .day-tab.active[data-day="1"]{background:var(--day1);border-color:var(--day1)}
        .day-tab.active[data-day="2"]{background:var(--day2);border-color:var(--day2)}
        .day-tab.active[data-day="3"]{background:var(--day3);border-color:var(--day3)}
        .day-tab.active[data-day="4"]{background:var(--day4);border-color:var(--day4)}

        /* === SIDEBAR === */
        .day-section{margin-bottom:16px}
        .day-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;border-radius:10px;background:#fff;border:1px solid var(--border)}
        .day-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
        .day-header-text h3{font-size:14px;font-weight:700}
        .day-header-text p{font-size:10px;color:var(--text-light);margin-top:1px}
        .timeline{position:relative;padding-left:22px}
        .timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:var(--border);border-radius:1px}
        .timeline-item{position:relative;margin-bottom:8px;cursor:pointer}
        .timeline-dot{position:absolute;left:-18px;top:12px;width:11px;height:11px;border-radius:50%;border:2.5px solid var(--day1);background:#fff;z-index:2;transition:all .3s}
        .timeline-item:hover .timeline-dot,.timeline-item.active .timeline-dot{transform:scale(1.3)}
        .timeline-item:hover .timeline-dot,.timeline-item.active .timeline-dot{background:var(--day1)}
        .timeline-item.day2 .timeline-dot{border-color:var(--day2)}.timeline-item.day2:hover .timeline-dot,.timeline-item.day2.active .timeline-dot{background:var(--day2)}
        .timeline-item.day3 .timeline-dot{border-color:var(--day3)}.timeline-item.day3:hover .timeline-dot,.timeline-item.day3.active .timeline-dot{background:var(--day3)}
        .timeline-item.day4 .timeline-dot{border-color:var(--day4)}.timeline-item.day4:hover .timeline-dot,.timeline-item.day4.active .timeline-dot{background:var(--day4)}
        .spot-card{background:#fff;border-radius:10px;padding:10px 12px;border:1.5px solid transparent;transition:all .3s;box-shadow:0 1px 3px var(--shadow)}
        .spot-card:hover{border-color:var(--day1);box-shadow:0 3px 10px rgba(45,140,78,.1);transform:translateY(-1px)}
        .timeline-item.active .spot-card{border-color:var(--day1);box-shadow:0 4px 14px rgba(45,140,78,.15)}
        .timeline-item.day2 .spot-card:hover,.timeline-item.day2.active .spot-card{border-color:var(--day2);box-shadow:0 4px 14px rgba(37,99,235,.12)}
        .timeline-item.day3 .spot-card:hover,.timeline-item.day3.active .spot-card{border-color:var(--day3);box-shadow:0 4px 14px rgba(224,108,45,.12)}
        .timeline-item.day4 .spot-card:hover,.timeline-item.day4.active .spot-card{border-color:var(--day4);box-shadow:0 4px 14px rgba(147,51,234,.12)}
        .spot-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
        .spot-name{font-size:13px;font-weight:600}
        .spot-time{font-size:10px;color:var(--text-light);background:#f5f3f0;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0}
        .spot-tags{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
        .spot-tag{font-size:9px;padding:1px 6px;border-radius:6px;background:#ECFDF5;color:var(--day1);font-weight:500}
        .spot-tag.food{background:#FFF7ED;color:var(--day3)}.spot-tag.transport{background:#EFF6FF;color:var(--day2)}.spot-tag.shop{background:#F5F3FF;color:var(--day4)}.spot-tag.photo{background:#FEF2F2;color:#DC2626}
        .transport-connector{display:flex;align-items:center;gap:5px;padding:3px 0 3px 3px;font-size:10px;color:var(--text-light)}
        .transport-line{flex:1;height:1px;background:repeating-linear-gradient(90deg,#d0d0d0,#d0d0d0 4px,transparent 4px,transparent 8px)}
        .transport-duration{font-size:9px;color:#999}

        /* === MAP MARKERS === */
        .custom-marker{position:relative}
        .marker-pin{width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3);transition:all .3s;border:2px solid #fff}
        .marker-pin.day1{background:var(--day1)}.marker-pin.day2{background:var(--day2)}.marker-pin.day3{background:var(--day3)}.marker-pin.day4{background:var(--day4)}.marker-pin.hotel{background:#E11D48}
        .marker-number{transform:rotate(45deg);color:#fff;font-size:11px;font-weight:700;font-family:'Noto Sans SC',sans-serif}
        .marker-label{position:absolute;top:-6px;left:34px;white-space:nowrap;background:rgba(255,255,255,.95);padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;color:var(--text);box-shadow:0 1px 5px rgba(0,0,0,.15);pointer-events:none;font-family:'Noto Sans SC',sans-serif;border:1px solid rgba(0,0,0,.06)}

        /* === LEGEND === */
        .map-legend{position:absolute;bottom:20px;left:54px;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-radius:10px;padding:12px 15px;box-shadow:0 2px 10px rgba(0,0,0,.08);z-index:800;font-size:11px}
        .legend-title{font-weight:700;margin-bottom:6px;font-size:11px}
        .legend-item{display:flex;align-items:center;gap:6px;margin-bottom:3px}
        .legend-color{width:10px;height:10px;border-radius:50%;border:1.5px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.1)}
        .legend-text{color:var(--text-light);font-size:10px}

        /* === BUFFER BADGE === */
        .buffer-tag{font-size:9px;padding:1px 6px;border-radius:6px;background:#FEF3C7;color:#92400E;font-weight:500}

        /* === MAP TILE LABEL SUPPRESSION === */
        .leaflet-tile-pane{
            filter: saturate(0.3) brightness(1.12) contrast(0.85);
        }
        /* Keep our overlays (markers, polylines) crisp and vivid - they sit in the overlay pane */
        .leaflet-overlay-pane, .leaflet-marker-pane, .leaflet-shadow-pane, .leaflet-popup-pane{
            filter: saturate(1) brightness(1) contrast(1);
        }

        /* === SELECTED MARKER HIGHLIGHT === */
        .marker-pin.selected{
            transform:rotate(-45deg) scale(1.45);
            box-shadow:0 0 0 5px rgba(255,255,255,.7), 0 0 0 9px currentColor, 0 4px 16px rgba(0,0,0,.35);
            z-index:9000 !important;
            transition:transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s ease;
        }
        .marker-pin.selected.day1{box-shadow:0 0 0 5px rgba(255,255,255,.7), 0 0 0 9px var(--day1), 0 4px 16px rgba(0,0,0,.35)}
        .marker-pin.selected.day2{box-shadow:0 0 0 5px rgba(255,255,255,.7), 0 0 0 9px var(--day2), 0 4px 16px rgba(0,0,0,.35)}
        .marker-pin.selected.day3{box-shadow:0 0 0 5px rgba(255,255,255,.7), 0 0 0 9px var(--day3), 0 4px 16px rgba(0,0,0,.35)}
        .marker-pin.selected.day4{box-shadow:0 0 0 5px rgba(255,255,255,.7), 0 0 0 9px var(--day4), 0 4px 16px rgba(0,0,0,.35)}
        .marker-pin.selected.hotel{box-shadow:0 0 0 5px rgba(255,255,255,.7), 0 0 0 9px #E11D48, 0 4px 16px rgba(0,0,0,.35)}
        @keyframes pulse-ring{
            0%{transform:scale(1);opacity:.6}
            100%{transform:scale(2.5);opacity:0}
        }
        .marker-pulse{
            position:absolute;top:50%;left:50%;width:30px;height:30px;margin:-15px 0 0 -15px;
            border-radius:50%;pointer-events:none;z-index:1;
        }
        .marker-pulse::before{
            content:'';position:absolute;inset:0;border-radius:50%;
            animation:pulse-ring 1.5s cubic-bezier(.215,.61,.355,1) infinite;
        }
        .marker-pulse.day1::before{background:var(--day1)}
        .marker-pulse.day2::before{background:var(--day2)}
        .marker-pulse.day3::before{background:var(--day3)}
        .marker-pulse.day4::before{background:var(--day4)}
        .marker-pulse.hotel::before{background:#E11D48}
        .custom-marker{z-index:500 !important}
        .custom-marker.marker-active{z-index:9999 !important}
        .marker-label-selected{background:rgba(30,30,30,.9) !important;color:#fff !important;font-weight:700 !important;padding:3px 9px !important;border:none !important;box-shadow:0 2px 10px rgba(0,0,0,.3) !important}
    
        /* === ADD SPOT MODAL === */
        .add-spot-fab{position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#7C3AED);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.35);z-index:1100;display:flex;align-items:center;justify-content:center;transition:all .3s}
        .add-spot-fab:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(37,99,235,.45)}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:2000;display:none;align-items:center;justify-content:center;padding:16px}
        .modal-overlay.show{display:flex}
        .modal-box{background:#fff;border-radius:16px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 24px 48px rgba(0,0,0,.2);animation:modalIn .25s ease}
        @keyframes modalIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .modal-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .modal-field{margin-bottom:14px}
        .modal-label{font-size:12px;font-weight:600;color:var(--text-light);margin-bottom:4px;display:block}
        .modal-input,.modal-select,.modal-textarea{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:#FAFAFA;transition:border .2s}
        .modal-input:focus,.modal-select:focus,.modal-textarea:focus{outline:none;border-color:#2563EB;background:#fff}
        .modal-textarea{resize:vertical;min-height:60px}
        .modal-row{display:flex;gap:10px}
        .modal-row .modal-field{flex:1}
        .modal-actions{display:flex;gap:10px;margin-top:18px}
        .modal-btn{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text);transition:all .2s;font-family:inherit}
        .modal-btn.primary{background:linear-gradient(135deg,#2563EB,#7C3AED);color:#fff;border-color:transparent}
        .modal-btn.primary:hover{opacity:.9}
        .modal-btn:hover{background:#F3F4F6}
        .modal-hint{font-size:11px;color:var(--text-light);margin-top:3px}
        .modal-pick-btn{padding:6px 12px;border-radius:6px;border:1.5px dashed var(--border);background:#FAFAFA;cursor:pointer;font-size:12px;color:var(--text-light);transition:all .2s;display:inline-flex;align-items:center;gap:4px}
        .modal-pick-btn:hover{border-color:#2563EB;color:#2563EB}
        .modal-pick-btn.active{border-color:#2D8C4E;color:#2D8C4E;background:#2D8C4E10}

        /* === FULLSCREEN DETAIL === */
        .detail-fullscreen-btn{width:28px;height:28px;border-radius:50%;border:none;background:rgba(0,0,0,.06);cursor:pointer;font-size:13px;color:#666;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
        .detail-fullscreen-btn:hover{background:rgba(0,0,0,.12);color:#333}
        .detail-panel.fullscreen{position:fixed!important;top:0!important;left:0!important;right:0!important;bottom:0!important;width:100%!important;height:100%!important;max-width:100%!important;border-radius:0!important;border:none!important;z-index:2500!important;transform:translateX(0)!important}
        .detail-panel.fullscreen .detail-image img{max-height:50vh;object-fit:contain}

        /* === RESPONSIVE IMPROVEMENTS === */
        @media(max-width:900px){
            .main-container{flex-direction:column}
            .sidebar{width:100%;min-width:auto;height:35vh;border-right:none;border-bottom:1px solid var(--border)}
            .map-container{height:65vh}
            .detail-panel{width:100%;height:60%;top:auto;bottom:0;right:0;transform:translateY(100%);border-left:none;border-top:1px solid var(--border);border-radius:16px 16px 0 0}
            .detail-panel.open{transform:translateY(0)}

// Map tiles: clean base map approach
// Use multiple tile sources with auto-fallback. The CSS filter on .leaflet-tile-pane
// desaturates and lightens the base map, fading out POI labels while keeping roads visible.
// Our custom markers and route lines sit above the filtered tiles.
const tileConfigs = [
        // Google 地图（WGS84坐标系，与标注点一致）
        { url:'https://mt{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}&hl=zh-CN', opts:{subdomains:'0123',maxZoom:20,attribution:'&copy; Google'} },
        // OSM 备选（同样使用WGS84）
        { url:'https://tile.openstreetmap.org/{z}/{x}/{y}.png', opts:{maxZoom:19,attribution:'&copy; OpenStreetMap'} },
        // 高德兜底（注意：高德使用GCJ02坐标系，标注会有偏移）
        { url:'https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=7&x={x}&y={y}&z={z}', opts:{subdomains:'1234',maxZoom:18,attribution:'&copy; 高德地图'} }
    ];
let currentTileIdx = 0;
let currentTile = null;
function loadTileLayer(idx) {
    if (idx >= tileConfigs.length) return;
    if (currentTile) map.removeLayer(currentTile);
    currentTileIdx = idx;
    const cfg = tileConfigs[idx];
    currentTile = L.tileLayer(cfg.url, cfg.opts).addTo(map);
    let errCount = 0;
    currentTile.on('tileerror', function() {
        errCount++;
        if (errCount >= 2) { loadTileLayer(idx + 1); }
    });
}
loadTileLayer(0);

let markers=[], routeLines=[];
function getDayClass(d){return d===1?'day1':d===2?'day2':d===3?'day3':'day3'}
function getDayColor(d){return d===1?'#2D8C4E':d===2?'#2563EB':d===3?'#E06C2D':'#E06C2D'}

function createMarker(spot){
    if(spot.noMarker)return;
    const dc=spot.type==='hotel'?'hotel':getDayClass(spot.day);
    const markerIcon=L.divIcon({
        className:'custom-marker',
        html:`<div class="marker-pin ${dc}"><span class="marker-number">${spot.type==='hotel'?'♥':spot.order}</span></div><div class="marker-label">${spot.name.length>8?spot.name.substring(0,8)+'…':spot.name}</div>`,
        iconSize:[30,30],iconAnchor:[15,30]
    });
    const m=L.marker([spot.lat,spot.lng],{icon:markerIcon}).addTo(map).on('click',()=>openDetail(spot.id));
    m.spotId=spot.id;m.spotDay=spot.day;markers.push(m);
}

function drawRouteLines(days){
    routeLines.forEach(l=>map.removeLayer(l));routeLines=[];
    days.forEach(day=>{
        const ds=spots.filter(s=>s.day===day&&!s.noMarker).sort((a,b)=>a.order-b.order);
        if(ds.length<2)return;
        const line=L.polyline(ds.map(s=>[s.lat,s.lng]),{color:getDayColor(day),weight:3.5,opacity:.7,dashArray:'10,8',smoothFactor:1.5}).addTo(map);
        routeLines.push(line);
    });
}


// ===================== LOCAL STORAGE + CROSS-DEVICE SYNC =====================
const STORAGE_KEY = 'nanjing_trip_custom_data';
const URL_PARAM_KEY = 'sync';

// ---- Core storage functions ----
function getStoredData(){
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : { coordOverrides:{}, customSpots:[] };
    } catch(e){ return { coordOverrides:{}, customSpots:[] }; }
}

function setStoredData(data){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){}
}

function loadCustomData(){
    // Priority: URL params > localStorage
    let data = null;
    
    // Check URL for sync data
    const urlData = loadFromUrl();
    if(urlData){
        data = urlData;
        // Save URL data to localStorage for future refreshes
        setStoredData(data);
        // Clean URL without reload
        const cleanUrl = window.location.href.split('?')[0].split('#')[0];
        window.history.replaceState(null, '', cleanUrl);
        showSyncToast('✓ 已从同步链接加载修改');
    } else {
        data = getStoredData();
    }
    
    if(!data) return;
    
    // Apply coordinate overrides
    if(data.coordOverrides){
        Object.entries(data.coordOverrides).forEach(([id, coords])=>{
            const spot = spots.find(s=>s.id===id);
            if(spot){ spot.lat=coords.lat; spot.lng=coords.lng; }
        });
    }
    
    // Add custom spots
    if(data.customSpots && data.customSpots.length){
        data.customSpots.forEach(cs=>{
            if(!spots.find(s=>s.id===cs.id)){
                spots.push(cs);
            }
        });
    }
    
    const overrideCount = Object.keys(data.coordOverrides||{}).length;
    const customCount = (data.customSpots||[]).length;
    if(overrideCount || customCount){
        console.log('[Sync] Loaded:', overrideCount, 'coord overrides,', customCount, 'custom spots');
    }
    
    // Update badge
    updateSyncBadge();
}

function saveCoordOverride(spotId, lat, lng){
    const data = getStoredData();
    data.coordOverrides[spotId] = { lat, lng };
    setStoredData(data);
    updateSyncBadge();
}

function saveCustomSpot(spot){
    const data = getStoredData();
    data.customSpots = data.customSpots.filter(s=>s.id!==spot.id);
    // Clone to avoid circular refs
    const clean = JSON.parse(JSON.stringify(spot));
    data.customSpots.push(clean);
    setStoredData(data);
    updateSyncBadge();
}

function resetAllCustomData(){
    if(!confirm('确定要重置所有修改吗？\n将还原所有手动调整的坐标，并删除所有新增的打卡点。')) return;
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
}

// ---- Sync badge ----
function updateSyncBadge(){
    const data = getStoredData();
    const count = Object.keys(data.coordOverrides||{}).length + (data.customSpots||[]).length;
    const badge = document.getElementById('syncBadge');
    const status = document.getElementById('syncStatus');
    if(badge){
        if(count > 0){ badge.style.display='flex'; badge.textContent=count; }
        else { badge.style.display='none'; }
    }
    if(status){
        if(count > 0){
            status.classList.add('has-data');
            const parts = [];
            const oc = Object.keys(data.coordOverrides||{}).length;
            const sc = (data.customSpots||[]).length;
            if(oc) parts.push(oc+'项坐标调整');
            if(sc) parts.push(sc+'个新增点');
            status.textContent = '已保存: '+parts.join(', ');
        } else {
            status.classList.remove('has-data');
        }
    }
}

// ---- Toast notification ----
function showSyncToast(msg, duration){
    const el = document.getElementById('syncToast');
    if(!el) return;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._timer);
    el._timer = setTimeout(()=>el.classList.remove('show'), duration||2500);
}

// ---- Sync menu toggle ----
function toggleSyncMenu(){
    const menu = document.getElementById('syncMenu');
    if(!menu) return;
    menu.classList.toggle('show');
    // Close on outside click
    if(menu.classList.contains('show')){
        setTimeout(()=>{
            const handler = (e)=>{
                if(!menu.contains(e.target) && e.target.id!=='syncFab'){
                    menu.classList.remove('show');
                    document.removeEventListener('click', handler);
                }
            };
            document.addEventListener('click', handler);
        }, 10);
    }
}

// ---- URL Sync (encode data into URL hash) ----
function compressData(data){
    // Use base64 encoding of JSON for URL-safe transport
    const json = JSON.stringify(data);
    try {
        // Try using compression via btoa
        return btoa(unescape(encodeURIComponent(json)));
    } catch(e){
        return btoa(json);
    }
}

function decompressData(str){
    try {
        const json = decodeURIComponent(escape(atob(str)));
        return JSON.parse(json);
    } catch(e){
        try { return JSON.parse(atob(str)); }
        catch(e2){ return null; }
    }
}

function loadFromUrl(){
    const params = new URLSearchParams(window.location.search);
    const syncParam = params.get(URL_PARAM_KEY);
    if(!syncParam) return null;
    return decompressData(syncParam);
}

function generateSyncUrl(){
    const data = getStoredData();
    const count = Object.keys(data.coordOverrides||{}).length + (data.customSpots||[]).length;
    if(count === 0){
        showSyncToast('暂无修改需要同步');
        return;
    }
    
    const encoded = compressData(data);
    const base = window.location.href.split('?')[0].split('#')[0];
    const syncUrl = base + '?' + URL_PARAM_KEY + '=' + encodeURIComponent(encoded);
    
    // Copy to clipboard
    navigator.clipboard.writeText(syncUrl).then(()=>{
        showSyncToast('✓ 同步链接已复制到剪贴板');
    }).catch(()=>{
        // Fallback: show in prompt
        prompt('复制此链接到其他设备打开：', syncUrl);
    });
    
    document.getElementById('syncMenu').classList.remove('show');
}

// ---- File Export/Import ----
function exportConfig(){
    const data = getStoredData();
    const count = Object.keys(data.coordOverrides||{}).length + (data.customSpots||[]).length;
    if(count === 0){
        showSyncToast('暂无修改需要导出');
        return;
    }
    
    const exportData = {
        _version: '1.0',
        _exportTime: new Date().toISOString(),
        _description: '港澳旅行地图 - 自定义配置',
        ...data
    };
    
    const blob = new Blob([JSON.stringify(exportData, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'nanjing_trip_config_' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    showSyncToast('✓ 配置已导出');
    document.getElementById('syncMenu').classList.remove('show');
}

function importConfig(event){
    const file = event.target.files[0];
    if(!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e){
        try {
            const data = JSON.parse(e.target.result);
            
            // Validate structure
            if(!data.coordOverrides && !data.customSpots){
                showSyncToast('⚠ 无效的配置文件');
                return;
            }
            
            const existing = getStoredData();
            
            // Merge: imported data overwrites existing
            if(data.coordOverrides){
                Object.assign(existing.coordOverrides, data.coordOverrides);
            }
            if(data.customSpots){
                data.customSpots.forEach(cs=>{
                    existing.customSpots = existing.customSpots.filter(s=>s.id!==cs.id);
                    existing.customSpots.push(cs);
                });
            }
            
            setStoredData(existing);
            
            const oc = Object.keys(data.coordOverrides||{}).length;
            const sc = (data.customSpots||[]).length;
            showSyncToast('✓ 已导入 '+oc+' 项坐标 + '+sc+' 个打卡点，刷新生效', 3000);
            
            setTimeout(()=>location.reload(), 1500);
        } catch(err){
            showSyncToast('⚠ 文件解析失败: '+err.message);
        }
    };
    reader.readAsText(file);
    event.target.value = ''; // Reset for re-upload
    document.getElementById('syncMenu').classList.remove('show');
}

// ===================== DETAIL PANEL (RIGHT SIDE) =====================
function getNextSpot(currentId){
    const cur=spots.find(s=>s.id===currentId);if(!cur)return null;
    const daySpots=spots.filter(s=>s.day===cur.day).sort((a,b)=>a.order-b.order);
    const idx=daySpots.findIndex(s=>s.id===currentId);
    if(idx<daySpots.length-1)return daySpots[idx+1];
    const nextDay=spots.filter(s=>s.day===cur.day+1).sort((a,b)=>a.order-b.order);
    return nextDay.length?nextDay[0]:null;
}
function getPrevSpot(currentId){
    const cur=spots.find(s=>s.id===currentId);if(!cur)return null;
    const daySpots=spots.filter(s=>s.day===cur.day).sort((a,b)=>a.order-b.order);
    const idx=daySpots.findIndex(s=>s.id===currentId);
    if(idx>0)return daySpots[idx-1];
    const prevDay=spots.filter(s=>s.day===cur.day-1).sort((a,b)=>a.order-b.order);
    return prevDay.length?prevDay[prevDay.length-1]:null;
}
function getSpotIndex(spotId){
    const s=spots.find(x=>x.id===spotId);if(!s)return{cur:0,total:0};
    const daySpots=spots.filter(x=>x.day===s.day).sort((a,b)=>a.order-b.order);
    return{cur:daySpots.findIndex(x=>x.id===spotId)+1,total:daySpots.length,day:s.day};
}

function openDetail(spotId){
    const spot=spots.find(s=>s.id===spotId);if(!spot)return;
    document.querySelectorAll('.timeline-item').forEach(el=>el.classList.remove('active'));
    const si=document.querySelector(`.timeline-item[data-spot-id="${spotId}"]`);
    if(si){si.classList.add('active');si.scrollIntoView({behavior:'smooth',block:'nearest'});}

    // Auto-switch day filter if needed
    if(currentFilter!=='all' && spot.day!==currentFilter){
        filterDay(spot.day);
    }

    // Highlight selected marker
    highlightMarker(spotId, spot.day, spot.type);

    // Pan map to spot
    const point=map.latLngToContainerPoint([spot.lat,spot.lng]);
    const panelWidth=380;
    const offsetPoint=L.point(point.x-panelWidth/2, point.y);
    const offsetLatLng=map.containerPointToLatLng(offsetPoint);
    map.flyTo([spot.lat, offsetLatLng.lng<spot.lng?spot.lng:offsetLatLng.lng], spot.day>=3?15:14,{duration:.5});

    const dc=getDayColor(spot.day);
    const next=getNextSpot(spotId);
    const prev=getPrevSpot(spotId);
    const idx=getSpotIndex(spotId);

    // Wire edit button in top bar
    const editBtn=document.getElementById('detailEditBtn');
    if(editBtn){
        if(spot.noMarker){editBtn.style.display='none';}
        else{editBtn.style.display='flex';editBtn.onclick=function(){startEditPosition(spot.id);};}
    }

    // Top nav bar
    let navHtml=`<button class="detail-nav-btn" ${prev?`onclick="openDetail('${prev.id}')"`:'disabled'}><span class="arrow">←</span> 上一站</button>`;
    navHtml+=`<span class="detail-nav-counter">Day${idx.day} · ${idx.cur}/${idx.total}</span>`;
    navHtml+=`<button class="detail-nav-btn" ${next?`onclick="openDetail('${next.id}')"`:'disabled'}>下一站 <span class="arrow">→</span></button>`;
    document.getElementById('detailNavTop').innerHTML=navHtml;

    // Image (no edit button inside image anymore)
    let imageHtml='';
    if(spot.image){
        imageHtml=`<div class="detail-image"><img src="${spot.image}" alt="${spot.name}" onerror="this.parentElement.innerHTML='<div class=detail-image-placeholder>${getEmoji(spot.type)}</div>'"><div class="detail-day-badge" style="background:${dc}">Day ${spot.day}</div></div>`;

    }

    let html=imageHtml+`
        <div class="detail-header"><div class="detail-title">${spot.name}</div>
        <div class="detail-meta"><span class="detail-badge" style="background:${dc}15;color:${dc};border:1px solid ${dc}30">Day ${spot.day}</span><span class="detail-badge">${spot.time}</span>${spot.tags.map(t=>`<span class="detail-badge">${t}</span>`).join('')}</div></div>
        <div class="detail-body">
        <div class="detail-section"><div class="detail-section-title">📍 位置</div><div class="detail-section-content">${spot.address}</div></div>
        <div class="detail-section"><div class="detail-section-title">📝 简介</div><div class="detail-section-content">${spot.desc}</div></div>`;

    if(spot.foods&&spot.foods.length){
        html+=`<div class="detail-section"><div class="detail-section-title">🍽️ 推荐美食</div><div class="detail-section-content">`;
        spot.foods.forEach(f=>html+=`<div class="detail-food-item"><span class="detail-food-emoji">🍜</span><div><div class="detail-food-name">${f.name}</div><div class="detail-food-desc">${f.note||''}</div></div></div>`);
        html+=`</div></div>`;
    }

}
function clearMarkerHighlight(){
    if(!activeMarkerId)return;
    const marker=markers.find(m=>m.spotId===activeMarkerId);
    if(marker){
        const el=marker.getElement();
        if(el){
            el.classList.remove('marker-active');
            const pin=el.querySelector('.marker-pin');
            const label=el.querySelector('.marker-label');
            if(pin)pin.classList.remove('selected');
            if(label)label.classList.remove('marker-label-selected');
            const pulse=el.querySelector('.marker-pulse');
            if(pulse)pulse.remove();
        }
    }
    activeMarkerId=null;
}

    // Visual feedback
    const el=marker.getElement();
    if(el)el.style.filter='drop-shadow(0 0 8px rgba(255,100,0,.6))';
}
function saveMarkerPosition(){
    if(!editingSpotId||!editingMarker)return;
    const newLL=editingMarker.getLatLng();
    const spot=spots.find(s=>s.id===editingSpotId);
    if(spot){spot.lat=newLL.lat;spot.lng=newLL.lng; saveCoordOverride(spot.id, newLL.lat, newLL.lng);}
    editingMarker.dragging.disable();
    const el=editingMarker.getElement();
    if(el)el.style.filter='';
    document.getElementById('editBar').classList.remove('show');
    // Redraw route lines
    drawRouteLines(currentFilter==='all'?[1,2,3,4]:[currentFilter]);
    editingSpotId=null;editingMarker=null;editOriginalLatLng=null;
}
function cancelEditPosition(){
    if(!editingSpotId||!editingMarker)return;
    editingMarker.setLatLng(editOriginalLatLng);
    editingMarker.dragging.disable();
    const el=editingMarker.getElement();
    if(el)el.style.filter='';
    document.getElementById('editBar').classList.remove('show');
    editingSpotId=null;editingMarker=null;editOriginalLatLng=null;
}


// ===================== ADD SPOT FEATURE =====================
let pickingLocation = false;
let pickMarker = null;

function showAddSpotModal(){
    document.getElementById('addSpotModal').classList.add('show');
    // Default day to current filter
    if(currentFilter && currentFilter !== 'all'){
        document.getElementById('addDay').value = currentFilter;
    }
}

function hideAddSpotModal(){
    document.getElementById('addSpotModal').classList.remove('show');
    stopPickLocation();
    // Clear form
    ['addName','addTime','addAddress','addDesc','addImage','addLat','addLng','addTags','addTips'].forEach(id=>{
        document.getElementById(id).value='';
    });
}

function togglePickLocation(){
    if(pickingLocation){stopPickLocation();}
    else{startPickLocation();}
}

function startPickLocation(){
    pickingLocation=true;
    document.getElementById('pickLocBtn').classList.add('active');
    document.getElementById('pickLocBtn').textContent='🎯 选点中...点击地图';
    document.getElementById('addSpotModal').style.pointerEvents='none';
    document.getElementById('addSpotModal').style.opacity='0.3';
    map.getContainer().style.cursor='crosshair';
    map.on('click', onMapPickLocation);
}

function stopPickLocation(){
    pickingLocation=false;
    document.getElementById('pickLocBtn').classList.remove('active');
    document.getElementById('pickLocBtn').textContent='🎯 地图选点';
    document.getElementById('addSpotModal').style.pointerEvents='auto';
    document.getElementById('addSpotModal').style.opacity='1';
    map.getContainer().style.cursor='';
    map.off('click', onMapPickLocation);
    if(pickMarker){map.removeLayer(pickMarker);pickMarker=null;}
}

function onMapPickLocation(e){
    const lat=e.latlng.lat.toFixed(4);
    const lng=e.latlng.lng.toFixed(4);
    document.getElementById('addLat').value=lat;
    document.getElementById('addLng').value=lng;
    if(pickMarker)map.removeLayer(pickMarker);
    pickMarker=L.marker([lat,lng],{icon:L.divIcon({className:'',html:'<div style="width:20px;height:20px;background:#2563EB;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.3)"></div>',iconSize:[20,20],iconAnchor:[10,10]})}).addTo(map);
    stopPickLocation();
}

function saveNewSpot(){
    const name=document.getElementById('addName').value.trim();
    const day=parseInt(document.getElementById('addDay').value);
    const lat=parseFloat(document.getElementById('addLat').value);
    const lng=parseFloat(document.getElementById('addLng').value);
    
    if(!name){alert('请输入打卡点名称');return;}
    if(isNaN(lat)||isNaN(lng)){alert('请设置坐标位置（点击「地图选点」在地图上选取）');return;}
    
    const type=document.getElementById('addType').value;
    const time=document.getElementById('addTime').value.trim()||'待定';
    const address=document.getElementById('addAddress').value.trim()||'';
    const desc=document.getElementById('addDesc').value.trim()||'';
    const image=document.getElementById('addImage').value.trim()||'';
    const tips=document.getElementById('addTips').value.trim()||'';
    const tagsStr=document.getElementById('addTags').value.trim();
    const tags=tagsStr?tagsStr.split(',').map(t=>t.trim()):[];
    const tagClasses=tags.map(()=>'');
    
    // Calculate order: append after last spot of this day
    const daySpots=spots.filter(s=>s.day===day);
    const maxOrder=daySpots.length?Math.max(...daySpots.map(s=>s.order)):0;
    const order=maxOrder+1;
    
    const id='custom_'+Date.now();
    
    const newSpot={
        id, name, day, order, time, lat, lng, type,
        tags, tagClasses,
        image, address, desc,
        foods:[], photos:[], tips,
        _custom:true
    };
    
    spots.push(newSpot);
    createMarker(newSpot);
    drawRouteLines();
    renderSidebar();
    saveCustomSpot(newSpot);
    
    hideAddSpotModal();
    
    // Open the new spot detail
    setTimeout(()=>openDetail(id),300);
}

// ===================== FULLSCREEN DETAIL =====================
function toggleDetailFullscreen(){
    const panel=document.getElementById('detailPanel');
    panel.classList.toggle('fullscreen');
    const btn=panel.querySelector('.detail-fullscreen-btn');
    if(panel.classList.contains('fullscreen')){
        btn.textContent='⊗';
        btn.title='退出全屏';
    } else {
        btn.textContent='⛶';
        btn.title='全屏';
    }
}

// closeDetail already handles fullscreen exit

</script>

        <div class="modal-field"><label class="modal-label">图片链接</label><input class="modal-input" id="addImage" placeholder="https://..."></div>
        <div class="modal-field">
            <label class="modal-label">坐标位置 *</label>
            <div style="display:flex;gap:8px;align-items:center">

        </div>
        <div class="modal-field"><label class="modal-label">标签（逗号分隔）</label><input class="modal-input" id="addTags" placeholder="如：🍜 美食, 📸 出片"></div>
        <div class="modal-field"><label class="modal-label">小贴士</label><textarea class="modal-textarea" id="addTips" placeholder="实用建议" rows="2"></textarea></div>
        <div class="modal-actions">
            <button class="modal-btn" onclick="hideAddSpotModal()">取消</button>
            <button class="modal-btn primary" onclick="saveNewSpot()">✓ 保存打卡点</button>
        </div>
    </div>
</div>
